spring.application.name=product-service

# Server configuration
server.port=8080

# Database connection
# Note: Removed useSSL=false as it is often deprecated; MySQL 8+ handles this better via connection packets
spring.datasource.url=jdbc:mysql://localhost:3306/product_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JDBC driver (Updated to the modern 'mysql-connector-j' compatible driver)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
# We removed the 'hibernate.dialect' line entirely. 
# Hibernate 7 automatically detects the MySQL version and applies the correct dialect.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Eureka client settings
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true